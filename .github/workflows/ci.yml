name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: propel
          POSTGRES_PASSWORD: propelpass
          POSTGRES_DB: propel_eval
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U propel -d propel_eval"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://propel:propelpass@localhost:5432/propel_eval
      SECRET_KEY: ci-secret-key
      CORS_ORIGINS: http://localhost:5173
      ENABLE_AUDIT_LOG: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Alembic migration check
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: https://api.example.com
        run: npm run build
