name: CI

on:
  push:
    branches: ["main", "feat/**", "codex/**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: propel
          POSTGRES_PASSWORD: propelpass
          POSTGRES_DB: propel_eval
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U propel -d propel_eval"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://propel:propelpass@localhost:5432/propel_eval
      SECRET_KEY: ci-secret-key
      CORS_ORIGINS: http://localhost:5173
      ENABLE_AUDIT_LOG: "false"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Alembic migration check
        working-directory: backend
        run: alembic upgrade head
      - name: Run tests
        working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        working-directory: frontend
        run: npm install
      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://api.example.com
        run: npm run build
